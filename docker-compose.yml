version: '3.8'

services:
  web:
    build: ./app
    networks:
      - app-network
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    networks:
      - app-network
    volumes:
      - redis-data:/data
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - web
    restart: always

# Mendefinisikan network custom agar container bisa saling berkomunikasi
networks:
  app-network:
    driver: bridge

# Mendefinisikan volume persisten untuk data Redis
volumes:
  redis-data:
